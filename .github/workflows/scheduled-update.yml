name: HR Tracker — update:daily (manual backup)

# NOTE: Scheduled cron has been moved to Vercel Cron (see vercel.json
# and api/cron/update.ts). This workflow remains as a MANUAL-ONLY backup
# so you can still kick off an update pipeline from the GitHub UI if
# Vercel is down or the cron endpoint is failing.
#
# To run: GitHub → Actions → "HR Tracker — update:daily (manual backup)"
#  → Run workflow → pick mode.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which update mode to run (daily | morning | night)'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - morning
          - night

concurrency:
  group: hr-tracker-update
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update:
    name: Run update:daily
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Log trigger
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "  Manual mode (if any):   ${{ github.event.inputs.mode || 'n/a' }}"
          echo "  UTC now: $(date -u +'%Y-%m-%d %H:%M:%S')"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pick mode
        id: pick
        run: |
          MODE="${{ github.event.inputs.mode || 'daily' }}"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "→ Running mode: $MODE"

      - name: Verify required secrets are present
        run: |
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY secret."
            echo "  Add them in GitHub → Settings → Secrets and variables → Actions."
            echo "  See README §'GitHub Actions secrets' for the full list."
            exit 1
          fi
          echo "✓ Required secrets are set (values masked)"

      - name: Run update:${{ steps.pick.outputs.mode }}
        run: npm run update:${{ steps.pick.outputs.mode }}
