name: HR Tracker — update:daily

# ─────────────────────────────────────────────────────────────────────────
# Runs `npm run update:daily` on a Pacific-Time cadence.
#
# GitHub Actions cron is UTC. The mappings below are calibrated to PDT
# (UTC-7), which covers ~all of MLB regular season + postseason. During
# PST (early March + November), the actual local trigger time will shift
# +1 hour (e.g., the "8 AM PT" line will fire at 9 AM PST).
#
# Pacific time → UTC cron
#    8:00 AM PT   →   15 UTC
#   12:00 PM PT   →   19 UTC
#    3:00 PM PT   →   22 UTC
#   10:00 PM PT   →   05 UTC (next calendar day)
#
# update:daily is idempotent and safe to re-run, so any drift around DST
# transitions is harmless — the worst case is one extra-early or
# extra-late run during the changeover week.
# ─────────────────────────────────────────────────────────────────────────

on:
  # Cron minutes are offset to ":07" instead of ":00" because GitHub
  # Actions cron is notoriously delayed (or sometimes outright dropped)
  # for jobs scheduled at the top of the hour due to massive cross-org
  # contention. Off-by-seven gets us into a much less congested slot.
  schedule:
    - cron: '7 15 * * *'   #  ~8:07 AM PT (PDT)
    - cron: '7 19 * * *'   # ~12:07 PM PT (PDT)
    - cron: '7 22 * * *'   #  ~3:07 PM PT (PDT)
    - cron: '7  5 * * *'   # ~10:07 PM PT (PDT) — UTC is "next day"
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which update mode to run (daily | morning | night)'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - morning
          - night

# A single in-flight run at a time. If a manual dispatch and a scheduled
# tick collide, GitHub queues the second one rather than running both
# concurrently — protects against duplicate writes.
concurrency:
  group: hr-tracker-update
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update:
    name: Run update:daily
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # ──────────────────────────────────────────────────────────────────
    # Secrets are exposed ONLY via env (job-level), and only to the run
    # step that needs them. GitHub automatically masks secret values in
    # all log output. The service role key is never echoed or persisted.
    # See the README for how to add these in repo Settings → Secrets.
    # ──────────────────────────────────────────────────────────────────
    env:
      # Backend script needs these — service role can write to the DB.
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Frontend (browser) values — included so future build/deploy steps
      # can use them too. Not actually consumed by update:daily.
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      # Visible first thing in every run log so you can immediately tell
      # whether it was a scheduled cron tick or a manual dispatch.
      - name: Log trigger
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "  Cron schedule (if any): ${{ github.event.schedule || 'n/a' }}"
          echo "  Manual mode (if any):   ${{ github.event.inputs.mode || 'n/a' }}"
          echo "  UTC now: $(date -u +'%Y-%m-%d %H:%M:%S')"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          # Node 22 is required because @supabase/supabase-js (via realtime-js)
          # uses native WebSocket at client construction time. Node ≤ 21 has
          # no native WebSocket and the constructor throws immediately.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (clean, lockfile-driven)
        run: npm ci

      # Pick which mode to run. Cron triggers always run 'daily'; manual
      # workflow_dispatch can override via the input dropdown.
      - name: Pick mode
        id: pick
        run: |
          MODE="${{ github.event.inputs.mode || 'daily' }}"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "→ Running mode: $MODE"

      - name: Verify required secrets are present
        run: |
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY secret."
            echo "  Add them in GitHub → Settings → Secrets and variables → Actions."
            echo "  See README §'GitHub Actions secrets' for the full list."
            exit 1
          fi
          echo "✓ Required secrets are set (values masked)"

      - name: Run update:${{ steps.pick.outputs.mode }}
        run: npm run update:${{ steps.pick.outputs.mode }}
